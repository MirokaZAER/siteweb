<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Portfolio de Matheo Sannajust-Dias</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="banner">
            <img src="images/banner.jpg" alt="Image de bannière" class="banner-image">
            <div class="banner-content">
                <img src="images/logo.png" alt="Logo de Matheo Sannajust-Dias" class="logo">
                <h1>Contact</h1>
            </div>
        </div>
    </header>

    <nav class="navbar">
        <ul class="navbar-menu">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="parcours.html">Parcours</a></li>
            <li><a href="competences.html">Compétences</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section id="contact-form">
            <h2>Contactez-moi</h2>
            <form action="#" method="post">
                <label for="name">Nom :</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message :</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button type="submit" class="submit-button">Envoyer</button>
            </form>

            <p>Mon numéro : 0621847927</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Matheo Sannajust-Dias. Tous droits réservés.</p>
    </footer>
</body>
</html>
