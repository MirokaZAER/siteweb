<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inscription - Festival de Musique</title>
</head>
<body>
<h1>Formulaire d'inscription - Festival de Musique</h1>
<form action="traitement.php" method="POST">
 
<fieldset>
<legend>Informations personnelles</legend>
<label for="nom">Nom :</label>
<input type="text" id="nom" name="nom" required /><br />
 
                <label for="prenom">lePrénom :</label>
<input type="text" id="prenom" name="prenom" required /><br />
 
                <label for="age">Âge :</label>
<input
                    type="number"
                    id="age"
                    name="age"
                    min="1"
                    required
                /><br />
 
                <label for="email">Adresse email :</label>
<input type="email" id="email" name="email" required />
</fieldset>
 
         
<fieldset>
<legend>Choix des options</legend>
<label for="type-billet">Type de billet :</label>
<select id="type-billet" name="type-billet" required>
<option value="plein-tarif">Plein tarif</option>
<option value="reduit">Tarif réduit</option>
<option value="groupe">Groupe</option></select
><br />
 
                <label for="nb-billets">Nombre de billets :</label>
<input
                    type="number"
                    id="nb-billets"
                    name="nb-billets"
                    min="1"
                    required
                /><br />
 
                <label>Options supplémentaires :</label><br />
<input
                    type="checkbox"
                    id="hebergement"
                    name="options"
                    value="hebergement"
                />
<label for="hebergement">Hébergement</label><br />
<input
                    type="checkbox"
                    id="restauration"
                    name="options"
                    value="restauration"
                />
<label for="restauration">Restauration</label>
</fieldset>
 
           
<fieldset>
<legend>Informations de paiement</legend>
<label for="mode-paiement">Mode de paiement :</label>
<select id="mode-paiement" name="mode-paiement" required>
<option value="carte-bancaire">Carte bancaire</option>
<option value="virement">Virement</option></select
><br />
 
                <div id="paiement-carte" style="display: none">
<label for="numero-carte">Numéro de carte :</label>
<input
                        type="text"
                        id="numero-carte"
                        name="numero-carte"
                        maxlength="16"
                    /><br />
 
                    <label for="date-expiration">Date d'expiration :</label>
<input
                        type="month"
                        id="date-expiration"
                        name="date-expiration"
                    /><br />
 
                    <label for="cvv">CVV :</label>
<input type="text" id="cvv" name="cvv" maxlength="3" />
</div>
</fieldset>
 
         
<fieldset>
<legend>Conditions générales</legend>
<input
                    type="checkbox"
                    id="conditions"
                    name="conditions"
                    required
                />
<label for="conditions"
>J'accepte les conditions générales</label
>
</fieldset>
 
         
<fieldset>
<legend>Autres fonctionnalités</legend>
<label for="justificatif">Télécharger un justificatif :</label>
<input
                    type="file"
                    id="justificatif"
                    name="justificatif"
                /><br />
 
                <label for="date-evenement">Choisir une date :</label>
<input type="date" id="date-evenement" name="date-evenement" />
</fieldset>
 
         
<button type="submit">S'inscrire</button>
</form>
 
        <script>
           
            document
                .getElementById("mode-paiement")
                .addEventListener("change", function () {
                    const paiementCarte =
                        document.getElementById("paiement-carte");
                    paiementCarte.style.display =
                        this.value === "carte-bancaire" ? "block" : "none";
                });
</script>
</body>
</html>
